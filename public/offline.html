<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline | oPOS</title>
    <style>
        body { font-family: Arial, sans-serif; background: #F4F7F5; color: #1A1A1A; margin: 0; }
        .wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
        .card { max-width: 420px; background: #fff; border: 1px solid #d9e2dc; border-radius: 14px; padding: 22px; text-align: center; }
        h1 { margin: 0 0 8px; color: #0B4D2C; font-size: 22px; }
        p { margin: 0; color: #4b5563; line-height: 1.45; }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>You are offline</h1>
            <p>oPOS cannot reach the network right now. Reconnect and try again.</p>
        </div>
    </div>
</body>
</html>
